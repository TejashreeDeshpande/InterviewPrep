    problem:"Use `lazy` to compute a user's full name only once. Use `observable` from `Delegates` to log every change to a user's status field. Combine both in a `UserSession` class.",
    features:["`by lazy { }` for one-time computation","`Delegates.observable` for change hooks","Property delegation syntax"],

    solution:`import kotlin.properties.Delegates

class UserSession(val firstName: String, val lastName: String) {
    val fullName: String by lazy {
        println("Computing fullName…")
        "$firstName $lastName"
    }

    var status: String by Delegates.observable("offline") { _, old, new ->
        println("Status changed: $old → $new")
    }
}

fun main() {
    val session = UserSession("Priya", "Sharma")
    println(session.fullName)  // prints "Computing fullName…" then "Priya Sharma"
    println(session.fullName)  // no recomputation
    session.status = "online"  // prints: Status changed: offline → online
    session.status = "away"    // prints: Status changed: online → away
}`,

    id:23, title:"Coroutine channel producer", topic:"Coroutines advanced", tag:"kotlin", diff:"intermediate",
    problem:"Build a `tickerChannel` that sends an incrementing counter every N milliseconds. A consumer coroutine should collect the first 5 ticks and then cancel the producer cleanly.",
    features:["`produce { }` coroutine builder","Receiving from a `ReceiveChannel`","Structured cancellation with `cancel()`"],
    starter:`import kotlinx.coroutines.*
import kotlinx.coroutines.channels.*

fun CoroutineScope.tickerChannel(intervalMs: Long): ReceiveChannel<Int> = TODO()`,
    solution:`import kotlinx.coroutines.*
import kotlinx.coroutines.channels.*

fun CoroutineScope.tickerChannel(intervalMs: Long): ReceiveChannel<Int> = produce {
    var count = 0
    while (true) {
        send(count++)
        delay(intervalMs)
    }
}

fun main() = runBlocking {
    val ticker = tickerChannel(200)
    repeat(5) {
        println("Tick: \${ticker.receive()}")
    }
    ticker.cancel()
    println("Done")
}`,

    problem:"Given two flows — one emitting stock prices every second and one emitting currency exchange rates every 2 seconds — use `combine` to always compute the latest converted price, then redo it with `zip` and explain the behavioural difference.",

    starter:`val priceFlow: Flow<Double> = TODO() // emits every 1s

    solution:`import kotlinx.coroutines.delay
import kotlinx.coroutines.flow.*

val priceFlow: Flow<Double> = flow {
    val prices = listOf(100.0, 102.0, 98.0, 105.0)
    prices.forEach { emit(it); delay(1000) }
}

val rateFlow: Flow<Double> = flow {
    val rates = listOf(83.0, 84.0)
    rates.forEach { emit(it); delay(2000) }
}

val combined: Flow<Double> = combine(priceFlow, rateFlow) { price, rate ->
    price * rate
}

val zipped: Flow<Double> = priceFlow.zip(rateFlow) { price, rate ->
    price * rate
}

// zipped:   emits only when BOTH emit; pairs by position; slower flow sets the pace`,

    solution:`@Composable
fun Modifier.shimmer(): Modifier {
    val transition = rememberInfiniteTransition(label = "shimmer")
    val translateX by transition.animateFloat(
        initialValue = -1000f,
        targetValue = 1000f,
        animationSpec = infiniteRepeatable(
            animation = tween(durationMillis = 1200, easing = LinearEasing)
        ),
        label = "shimmer_x"
    )
    return this.background(
        brush = Brush.horizontalGradient(
            colors = listOf(
                Color(0xFFE0E0E0),
                Color(0xFFF5F5F5),
                Color(0xFFE0E0E0)
            ),
            startX = translateX,
            endX = translateX + 600f
        )
    )
}

@Composable
fun ShimmerCard() {
    Card(modifier = Modifier.fillMaxWidth().padding(16.dp)) {
        Column(modifier = Modifier.padding(16.dp), verticalArrangement = Arrangement.spacedBy(8.dp)) {
            Box(modifier = Modifier.fillMaxWidth().height(20.dp).shimmer())
            Box(modifier = Modifier.fillMaxWidth(0.6f).height(16.dp).shimmer())
            Box(modifier = Modifier.fillMaxWidth().height(80.dp).shimmer())
        }
    }
}`,

    solution:`class SyncWorker(
    ctx: Context,
    params: WorkerParameters
) : CoroutineWorker(ctx, params) {

    companion object {
        const val KEY_PROGRESS = "PROGRESS"

        fun buildRequest(): OneTimeWorkRequest {
            val constraints = Constraints.Builder()
                .setRequiredNetworkType(NetworkType.UNMETERED)
                .build()
            return OneTimeWorkRequestBuilder<SyncWorker>()
                .setConstraints(constraints)
                .build()
        }
    }

    override suspend fun doWork(): Result {
        val totalItems = 10
        repeat(totalItems) { i ->
            delay(300)
            val progress = ((i + 1) * 100) / totalItems
            setProgress(workDataOf(KEY_PROGRESS to progress))
        }
        return Result.success(workDataOf("synced_count" to totalItems))
    }
}

    solution:`class CircularProgressView @JvmOverloads constructor(
    context: Context,
    attrs: AttributeSet? = null
) : View(context, attrs) {

    private val trackPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
        style = Paint.Style.STROKE
        strokeWidth = 20f
        color = Color.LTGRAY
    }
    private val progressPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
        style = Paint.Style.STROKE
        strokeWidth = 20f
        strokeCap = Paint.Cap.ROUND
        color = Color.parseColor("#1D9E75")
    }

    var progress: Int = 0
        set(value) { field = value.coerceIn(0, 100); invalidate() }

    private val oval = RectF()

    override fun onSizeChanged(w: Int, h: Int, oldW: Int, oldH: Int) {
        val inset = 20f
        oval.set(inset, inset, w - inset, h - inset)
    }

    override fun onDraw(canvas: Canvas) {
        canvas.drawArc(oval, -90f, 360f, false, trackPaint)
        val sweep = 360f * progress / 100f
        canvas.drawArc(oval, -90f, sweep, false, progressPaint)
    }
}`,

    solution:`data class Contact(val name: String, val phone: String)

@Composable
fun ContactList(contacts: List<Contact>) {
    var selectedName by rememberSaveable { mutableStateOf<String?>(null) }

    val grouped = remember(contacts) {
        contacts.sortedBy { it.name }
            .groupBy { it.name.first().uppercaseChar() }
    }

    LazyColumn {
        grouped.forEach { (initial, group) ->
            stickyHeader(key = initial) {
                Surface(
                    color = MaterialTheme.colorScheme.surfaceVariant,
                    modifier = Modifier.fillMaxWidth()
                ) {
                    Text(
                        text = initial.toString(),
                        style = MaterialTheme.typography.labelLarge,
                        modifier = Modifier.padding(horizontal = 16.dp, vertical = 8.dp)
                    )
                }
            }
            items(group, key = { it.name }) { contact ->
                val isSelected = contact.name == selectedName
                ListItem(
                    headlineContent = { Text(contact.name) },
                    supportingContent = { Text(contact.phone) },
                    colors = ListItemDefaults.colors(
                        containerColor = if (isSelected)
                            MaterialTheme.colorScheme.primaryContainer
                        else MaterialTheme.colorScheme.surface
                    ),
                    modifier = Modifier.clickable { selectedName = contact.name }
                )
            }
        }
    }
}`,

    id:29, title:"Paging 3: PagingSource", topic:"Android fundamentals", tag:"android", diff:"intermediate",
    problem:"Implement a `MoviePagingSource` that loads paginated movies from a fake API (list of 100 items). Wire it to a `Pager` and expose a `Flow<PagingData<Movie>>` from a ViewModel.",
    features:["`PagingSource<Key, Value>` with `load()`","Constructing `LoadResult.Page` with next/prev keys","`Pager` + `cachedIn(viewModelScope)`"],
    starter:`data class Movie(val id: Int, val title: String)

class MoviePagingSource(private val api: MovieApi) : PagingSource<Int, Movie>() {
    override suspend fun load(params: LoadParams<Int>): LoadResult<Int, Movie> = TODO()
    override fun getRefreshKey(state: PagingState<Int, Movie>): Int? = TODO()

    solution:`data class Movie(val id: Int, val title: String)

interface MovieApi {
    suspend fun getMovies(page: Int, pageSize: Int): List<Movie>
}

class MoviePagingSource(
    private val api: MovieApi
) : PagingSource<Int, Movie>() {

    override suspend fun load(params: LoadParams<Int>): LoadResult<Int, Movie> {
        val page = params.key ?: 1
        return try {
            val movies = api.getMovies(page, params.loadSize)
            LoadResult.Page(
                data = movies,
                prevKey = if (page == 1) null else page - 1,
                nextKey = if (movies.isEmpty()) null else page + 1
            )
        } catch (e: Exception) {
            LoadResult.Error(e)
        }
    }

    override fun getRefreshKey(state: PagingState<Int, Movie>): Int? =
        state.anchorPosition?.let { anchor ->
            state.closestPageToPosition(anchor)?.prevKey?.plus(1)
                ?: state.closestPageToPosition(anchor)?.nextKey?.minus(1)
        }
}

class MovieViewModel(private val api: MovieApi) : ViewModel() {
    val movies: Flow<PagingData<Movie>> = Pager(
        config = PagingConfig(pageSize = 20, enablePlaceholders = false)
    ) {
        MoviePagingSource(api)
    }.flow.cachedIn(viewModelScope)
}`,

    solution:`import kotlinx.coroutines.*

val handler = CoroutineExceptionHandler { _, throwable ->
    println("Handler caught: \${throwable.message}")
}

fun main() = runBlocking {
    // launch: exception propagates to parent scope → handler catches it
    val job = CoroutineScope(Dispatchers.Default + handler).launch {
        throw RuntimeException("launch error")
    }
    job.join()
    // Output: Handler caught: launch error

    // async: exception is stored in Deferred; handler does NOT fire
    val deferred = CoroutineScope(Dispatchers.Default + handler).async {
        throw RuntimeException("async error")
    }
    try {
        deferred.await()
    } catch (e: RuntimeException) {
        println("try/catch got: \${e.message}")
    }
    // Output: try/catch got: async error
    // (handler is NOT called)

    println("Done")
}`,

      {input:"launch block throws",output:'"Handler caught: launch error"'},
      {input:"async block throws; no await",output:"Exception silently stored — only thrown when await() called"}
    ],
    edgeCases:["`SupervisorJob` prevents sibling coroutine cancellation when one fails","Handler on a child coroutine is ignored — only the root scope's handler fires","async without await() in a non-supervisor scope cancels the whole scope"],
    explanation:"`launch` fire-and-forget exceptions propagate to the parent scope immediately. `async` wraps exceptions in the `Deferred` result — they only surface when you call `await()`. This is why `async` must always be paired with `try/catch` around `await()`.",

    solution:`import kotlinx.coroutines.delay
import kotlinx.coroutines.flow.*

sealed class RetryState<out T> {
    data class Retrying(val attempt: Int, val delayMs: Long) : RetryState<Nothing>()
    data class Data<T>(val value: T) : RetryState<T>()
    data class Failed(val error: Throwable) : RetryState<Nothing>()
}

fun <T> Flow<T>.retryWithBackoff(
    maxRetries: Int,
    initialDelay: Long = 500L
): Flow<RetryState<T>> = flow {
    var attempt = 0
    var delayMs = initialDelay
    while (true) {
        try {
            this@retryWithBackoff.collect { emit(RetryState.Data(it)) }
            break
        } catch (e: Exception) {
            if (attempt >= maxRetries) { emit(RetryState.Failed(e)); break }
            emit(RetryState.Retrying(attempt + 1, delayMs))
            delay(delayMs)
            delayMs *= 2
            attempt++
        }
    }
}`,

const TOPICS2 = [...new Set(A2.map(a => a.topic))];
let activeTopics2 = new Set();
let curIdx2 = 0;
let activeTab2 = 'problem';

function getFiltered2() {
  if (activeTopics2.size === 0) return A2;
  return A2.filter(a => activeTopics2.has(a.topic));
}

function renderFilters2() {
  const c = document.getElementById('filters2');
  c.innerHTML = '';
  TOPICS2.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeTopics2.has(t) ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { activeTopics2.has(t) ? activeTopics2.delete(t) : activeTopics2.add(t); curIdx2=0; renderFilters2(); renderCard2(); };
    c.appendChild(btn);
  });
}

function renderCard2() {
  const filtered = getFiltered2();
  const counter = document.getElementById('counter2');
  const area = document.getElementById('card-area2');
  document.getElementById('prev2').disabled = curIdx2 === 0;
  document.getElementById('next2').disabled = curIdx2 >= filtered.length - 1;
  if (!filtered.length) { area.innerHTML = '<div class="empty">No assignments match.</div>'; counter.textContent = '0 assignments'; return; }
  curIdx2 = Math.max(0, Math.min(curIdx2, filtered.length - 1));
  counter.textContent = `${curIdx2 + 1} of ${filtered.length}`;
  const a = filtered[curIdx2];
  const TABS = ['problem','solution','io','followup'];
  const LABELS = {problem:'Problem',solution:'Solution',io:'I/O & Edges',followup:'Follow-up'};
  area.innerHTML = `<div class="card">
    <div class="card-header">
      <p class="card-title">${a.id}. ${a.title}</p>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <span class="badge badge-${a.tag}">${a.tag==='kotlin'?'Kotlin':'Android'}</span>
        <span class="badge badge-${a.diff}">${a.diff}</span>
        <span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${a.topic}</span>
      </div>
    </div>
    <div class="card-body">
      <div class="tabs" id="t2-tabs"></div>
      <div class="section" id="t2-problem"></div>
      <div class="section" id="t2-solution"></div>
      <div class="section" id="t2-io"></div>
      <div class="section" id="t2-followup"></div>
    </div>
  </div>`;
  const tr = document.getElementById('t2-tabs');
  TABS.forEach(t => { const el=document.createElement('div'); el.className='tab'+(activeTab2===t?' active':''); el.textContent=LABELS[t]; el.onclick=()=>{activeTab2=t;switchTab2();}; tr.appendChild(el); });
  document.getElementById('t2-problem').innerHTML = `<div class="section-label">Problem</div><p class="text">${a.problem}</p><div class="section-label">Required features</div><ul class="list">${a.features.map(f=>`<li>${f}</li>`).join('')}</ul>${a.starter?`<div class="section-label">Starter code</div><pre>${esc2(a.starter)}</pre>`:''}`;
  document.getElementById('t2-solution').innerHTML = `<div class="section-label">Solution</div><pre>${esc2(a.solution)}</pre><div class="section-label">Explanation</div><p class="text">${a.explanation}</p>`;
  document.getElementById('t2-io').innerHTML = `<div class="section-label">Sample I/O</div>${a.inputOutput.map(io=>`<div class="io-row"><div class="io-box"><div class="io-label">Input</div><pre>${esc2(io.input)}</pre></div><div class="io-box"><div class="io-label">Output</div><pre>${esc2(io.output)}</pre></div></div>`).join('')}<div class="section-label">Edge cases</div><ul class="list">${a.edgeCases.map(e=>`<li>${e}</li>`).join('')}</ul>`;
  document.getElementById('t2-followup').innerHTML = `<div class="section-label">Interview follow-up</div><div class="callout">${a.followUp}</div><button class="action-btn" style="margin-top:12px" onclick="sendPrompt('Answer this Kotlin/Android interview question in depth: ${a.followUp.replace(/'/g,"\\'").replace(/"/g,'&quot;')} ↗')">Discuss this question ↗</button>`;
  switchTab2();
}

function switchTab2() {
  ['problem','solution','io','followup'].forEach((t,i) => {
    const s = document.getElementById('t2-'+t); if(s) s.className='section'+(activeTab2===t?' visible':'');
  });
  document.querySelectorAll('#t2-tabs .tab').forEach((el,i) => {
    el.className='tab'+(['problem','solution','io','followup'][i]===activeTab2?' active':'');
  });
}

function nav2(dir) { curIdx2 = Math.max(0, Math.min(curIdx2+dir, getFiltered2().length-1)); renderCard2(); }
function esc2(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderFilters2();
renderCard2();
</script>
