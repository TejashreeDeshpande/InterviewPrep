    id: 1, title: "Null-safe user profile", topic: "Null safety", tag: "kotlin", diff: "beginner",
    problem: "You have a nullable user object fetched from a network call. Safely extract the user's display name, defaulting to 'Guest' if the user or name is null. Also log a warning if the email is missing.",
    features: ["Safe calls with `?.`", "Elvis operator `?:`", "Let block for null-check side effects"],
    starter: `data class User(val name: String?, val email: String?)

    // TODO: return name or "Guest"

    solution: `data class User(val name: String?, val email: String?)

fun getUserLabel(user: User?): String {
    user?.email ?: println("Warning: email is missing")
    return user?.name ?: "Guest"
}

fun main() {
    println(getUserLabel(null))             // Guest
    println(getUserLabel(User(null, null))) // Guest + warning
    println(getUserLabel(User("Ada", "ada@example.com"))) // Ada
}`,
    inputOutput: [

      { input: 'getUserLabel(User("Ada", null))', output: 'Warning printed, returns "Ada"' }

    edgeCases: ["User object is null", "User exists but name is null", "User exists but email is null"],
    explanation: "Safe-call `?.` short-circuits to null instead of throwing NPE. The Elvis `?:` provides a fallback. Chaining them keeps the logic single-line and readable.",

    starter: `data class Transaction(val id: Int, val type: String, val amount: Double)

    solution: `data class Transaction(val id: Int, val type: String, val amount: Double)

fun summarizeCredits(transactions: List<Transaction>): String {
    val total = transactions
        .filter { it.type == "credit" && it.amount > 500 }
        .sortedByDescending { it.amount }
        .sumOf { it.amount }
    return "₹%,.2f".format(total)
}

fun main() {
    val txns = listOf(
        Transaction(1, "credit", 1200.0),
        Transaction(2, "debit", 300.0),
        Transaction(3, "credit", 450.0),
        Transaction(4, "credit", 800.0)

    println(summarizeCredits(txns)) // ₹2,000.00
}`,
    inputOutput: [

    explanation: "Kotlin collection pipelines are lazy-readable: filter → sort → reduce. `sumOf` is type-safe and avoids `.sum()` on mapped doubles. `%,.2f` adds locale-style comma separators.",

    problem: "Model the three states of a network call — Loading, Success (with data), and Error (with a message). Write a function that renders each state to a UI-friendly string.",

fun <T> renderState(state: ApiState<T>): String {
    // TODO

    solution: `sealed class ApiState<out T> {
    object Loading : ApiState<Nothing>()
    data class Success<T>(val data: T) : ApiState<T>()
    data class Error(val message: String) : ApiState<Nothing>()
}

fun <T> renderState(state: ApiState<T>): String = when (state) {
    is ApiState.Loading -> "Loading…"
    is ApiState.Success -> "Data: \${state.data}"
    is ApiState.Error   -> "Error: \${state.message}"
}

fun main() {
    println(renderState(ApiState.Loading))
    println(renderState(ApiState.Success("Hello")))
    println(renderState(ApiState.Error("Timeout")))
}`,

    explanation: "`sealed class` restricts subclasses to the same file, letting `when` be exhaustive without an `else`. `object` is a singleton (no data), `data class` gets copy/equals/toString for free.",
    followUp: "Why is `out T` (covariance) used here? What would break if you removed it and tried to assign `ApiState.Loading` to `ApiState<String>`?"
  },
  {
    id: 4, title: "Higher-order retry mechanism", topic: "Higher-order functions", tag: "kotlin", diff: "intermediate",
    problem: "Write a `retry` function that re-invokes a suspending block up to N times, with exponential backoff, stopping early on success and rethrowing the last exception on total failure.",
    features: ["Higher-order function taking `suspend () -> T`", "Exponential backoff with `delay`", "Exception handling with `runCatching`"],
    starter: `suspend fun <T> retry(
    times: Int,
    initialDelayMs: Long = 100,
    block: suspend () -> T
): T {
    // TODO
}`,
    solution: `import kotlinx.coroutines.delay

suspend fun <T> retry(
    times: Int,
    initialDelayMs: Long = 100,
    block: suspend () -> T
): T {
    var delayMs = initialDelayMs
    var lastException: Throwable? = null
    repeat(times) { attempt ->
        runCatching { return block() }
            .onFailure {
                lastException = it
                if (attempt < times - 1) delay(delayMs)
                delayMs *= 2
            }
    }
    throw lastException!!
}`,
    inputOutput: [
      { input: "block fails twice then succeeds", output: "returns result on 3rd attempt" },
      { input: "block always fails (times=3)", output: "throws last exception" }
    ],
    edgeCases: ["times = 1 (no retry, just one attempt)", "Block throws different exceptions each time", "Successful on first attempt (no delay at all)"],
    explanation: "`runCatching` wraps the call in a Result — on success `return` exits the outer function, on failure we wait and double the delay. The pattern avoids nested try/catch blocks.",
    followUp: "How would you add a `shouldRetry: (Throwable) -> Boolean` predicate so only transient errors are retried?"
  },

    solution: `fun String.toTitleCase(): String =
    split(" ").joinToString(" ") { word ->
        word.replaceFirstChar { it.uppercaseChar() }
    }

fun String.isValidEmail(): Boolean =
    Regex("^[\\w.+-]+@[\\w-]+\\.[a-z]{2,}\$").matches(this)

fun String.truncate(max: Int): String =
    if (length <= max) this else substring(0, max) + "…"

fun main() {
    println("hello world".toTitleCase())     // Hello World

    problem: "Build a `CountdownTimer` that counts down from N seconds, emitting each tick to a callback, and calls `onFinish` when done. It must be cancellable.",
    features: ["`CoroutineScope` + `launch`", "`delay` for 1-second ticks", "Structured concurrency with `Job`"],
    starter: `class CountdownTimer(private val scope: CoroutineScope) {
    private var job: Job? = null

    fun start(seconds: Int, onTick: (Int) -> Unit, onFinish: () -> Unit) {
        // TODO
    }

    fun cancel() { job?.cancel() }

    solution: `import kotlinx.coroutines.*

class CountdownTimer(private val scope: CoroutineScope) {
    private var job: Job? = null

    fun start(seconds: Int, onTick: (Int) -> Unit, onFinish: () -> Unit) {
        job?.cancel()
        job = scope.launch {
            for (remaining in seconds downTo 1) {
                onTick(remaining)
                delay(1000L)
            }
            onFinish()
        }
    }

    fun cancel() { job?.cancel() }
}`,

    explanation: "`job?.cancel()` implements the 'cancel then restart' pattern safely. `delay` is a suspension point, so cancellation works cooperatively — the loop stops at the next `delay`.",

  },

    starter: `data class SearchUiState(

class SearchViewModel : ViewModel() {

    solution: `data class SearchUiState(
    val query: String = "",
    val results: List<String> = emptyList()
)

class SearchViewModel : ViewModel() {
    private val cities = listOf(
        "Mumbai","Delhi","Bangalore","Chennai","Kolkata","Hyderabad","Pune"
    )
    private val _uiState = MutableStateFlow(SearchUiState())
    val uiState: StateFlow<SearchUiState> = _uiState.asStateFlow()

    fun onQueryChanged(query: String) {
        _uiState.update { current ->
            current.copy(
                query = query,
                results = cities.filter {
                    it.contains(query, ignoreCase = true)
                }
            )
        }
    }
}`,

    explanation: "`StateFlow` is a hot flow: new collectors always get the latest value immediately. `update {}` is atomic, avoiding race conditions when multiple coroutines write concurrently.",
    followUp: "How does `StateFlow` differ from `SharedFlow`? When would you choose one over the other?"

    problem: "Model a `Product` with name, price, and category. Write functions: (1) `applyDiscount` that returns a copy with reduced price; (2) `cheapest` that destructures a list to find the min-price item.",
    features: ["`data class` with `copy()`", "Destructuring declarations", "`minByOrNull` on a list"],
    starter: `data class Product(val name: String, val price: Double, val category: String)

fun applyDiscount(product: Product, percent: Int): Product = TODO()

    solution: `data class Product(val name: String, val price: Double, val category: String)

fun applyDiscount(product: Product, percent: Int): Product =
    product.copy(price = product.price * (1 - percent / 100.0))

fun cheapest(products: List<Product>): String {
    val (name, price, _) = products.minByOrNull { it.price }
        ?: return "No products"
    return "\$name @ ₹\${"%.2f".format(price)}"
}

fun main() {
    val p = Product("Notebook", 200.0, "Stationery")
    println(applyDiscount(p, 10)) // price = 180.0
    val list = listOf(p, Product("Pen", 20.0, "Stationery"))
    println(cheapest(list)) // Pen @ ₹20.00
}`,

    id: 9, title: "Room entity + DAO skeleton", topic: "Room basics", tag: "android", diff: "intermediate",
    problem: "Create a `Note` Room entity and a `NoteDao` with insert, delete by id, and a Flow-based query that returns all notes ordered by creation time descending.",

    solution: `import androidx.room.*
import kotlinx.coroutines.flow.Flow

@Entity(tableName = "notes")
data class Note(
    @PrimaryKey(autoGenerate = true) val id: Int = 0,
    @ColumnInfo(name = "title") val title: String,
    @ColumnInfo(name = "body") val body: String,
    @ColumnInfo(name = "created_at") val createdAt: Long = System.currentTimeMillis()
)

@Dao
interface NoteDao {
    @Insert(onConflict = OnConflictStrategy.REPLACE)
    suspend fun insert(note: Note)

    @Query("DELETE FROM notes WHERE id = :id")
    suspend fun deleteById(id: Int)

    @Query("SELECT * FROM notes ORDER BY created_at DESC")
    fun getAllNotes(): Flow<List<Note>>
}`,

    explanation: "Returning `Flow<List<Note>>` makes Room reactive — the UI auto-updates on DB changes without polling. `suspend` on write functions prevents blocking the main thread.",

  {
    id: 10, title: "Compose search bar component", topic: "Jetpack Compose basics", tag: "android", diff: "intermediate",
    problem: "Build a reusable `SearchBar` composable that takes a query string, an onChange callback, and a clear button. Show a 'No results' message when the query is non-empty but results are empty.",

fun SearchBar(
    query: String,
    onQueryChange: (String) -> Unit,
    results: List<String>
) {
    Column(modifier = Modifier.fillMaxWidth().padding(16.dp)) {
        OutlinedTextField(
            value = query,
            onValueChange = onQueryChange,
            label = { Text("Search cities") },
            trailingIcon = {
                if (query.isNotEmpty()) {
                    IconButton(onClick = { onQueryChange("") }) {

            },
            modifier = Modifier.fillMaxWidth(),

    problem: "Given a list of expense items with category and amount, group them by category and return a map of category → total spend, sorted by total descending.",
    features: ["`groupBy`, `mapValues`, `sumOf`", "`toSortedMap` vs `sortedByDescending`", "Chaining collection operations"],
    starter: `data class Expense(val category: String, val amount: Double)
fun categoryTotals(expenses: List<Expense>): Map<String, Double> = TODO()`,
    solution: `data class Expense(val category: String, val amount: Double)

fun categoryTotals(expenses: List<Expense>): Map<String, Double> =
    expenses
        .groupBy { it.category }
        .mapValues { (_, items) -> items.sumOf { it.amount } }
        .entries
        .sortedByDescending { it.value }

    override fun pay(amount: Double) =
        "Charged ₹%.2f to card ending $last4".format(amount)

class UPI(private val id: String) : PaymentStrategy {
    override fun pay(amount: Double) =
        "Sent ₹%.2f via UPI to $id".format(amount)

class Wallet(private var balance: Double) : PaymentStrategy {
    override fun pay(amount: Double): String {

    }

    }

    solution: `interface UserApi { suspend fun getUser(id: String): User }
data class User(val id: String, val name: String)

class UserRepository(private val api: UserApi) {
    fun getUser(id: String): Flow<Result<User>> = flow {
        emit(Result.loading())
        val result = runCatching { api.getUser(id) }
        emit(result.fold(
            onSuccess = { Result.success(it) },
            onFailure = { Result.error(it.message ?: "Unknown error") }
        ))
    }
}

sealed class Result<out T> {
    object Loading : Result<Nothing>()
    data class Success<T>(val data: T) : Result<T>()
    data class Error(val message: String) : Result<Nothing>()
    companion object {
        fun loading() = Loading
        fun <T> success(data: T) = Success(data)
        fun error(msg: String) = Error(msg)
    }
}

class UserViewModel(private val repo: UserRepository) : ViewModel() {
    fun loadUser(id: String): StateFlow<Result<User>> =
        repo.getUser(id)
            .stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), Result.Loading)
}`,

const TOPICS = [...new Set(ASSIGNMENTS.map(a => a.topic))];

let activeTopics = new Set();
let currentIdx = 0;

function getFiltered() {
  if (activeTopics.size === 0) return ASSIGNMENTS;
  return ASSIGNMENTS.filter(a => activeTopics.has(a.topic));
}

function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeTopics.has(t) ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      activeTopics.has(t) ? activeTopics.delete(t) : activeTopics.add(t);
      currentIdx = 0;
      renderFilters();
      renderCard();
    };
    container.appendChild(btn);
  });
}

let activeTab = 'problem';

function renderCard() {
  const filtered = getFiltered();
  const counter = document.getElementById('counter');
  const area = document.getElementById('card-area');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  if (filtered.length === 0) {
    area.innerHTML = '<div class="empty">No assignments match the selected topics.</div>';
    counter.textContent = '0 assignments';
    prevBtn.disabled = true; nextBtn.disabled = true;
    return;
  }

  currentIdx = Math.max(0, Math.min(currentIdx, filtered.length - 1));
  const a = filtered[currentIdx];
  prevBtn.disabled = currentIdx === 0;
  nextBtn.disabled = currentIdx === filtered.length - 1;
  counter.textContent = `${currentIdx + 1} of ${filtered.length}`;

  const tabs = ['problem','solution','io','followup'];
  const tabLabels = { problem: 'Problem', solution: 'Solution', io: 'I/O & Edge cases', followup: 'Follow-up' };

  area.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div style="flex:1">
          <p class="card-title">${a.id}. ${a.title}</p>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <span class="badge badge-${a.tag}">${a.tag === 'kotlin' ? 'Kotlin' : 'Android'}</span>
            <span class="badge badge-diff-${a.diff}">${a.diff}</span>
            <span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${a.topic}</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="tabs" id="tabs-row"></div>
        <div class="section" id="sec-problem"></div>
        <div class="section" id="sec-solution"></div>
        <div class="section" id="sec-io"></div>
        <div class="section" id="sec-followup"></div>
      </div>
    </div>`;

  const tabsRow = document.getElementById('tabs-row');
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (activeTab === t ? ' active' : '');
    el.textContent = tabLabels[t];
    el.onclick = () => { activeTab = t; switchTab(); };
    tabsRow.appendChild(el);
  });

  document.getElementById('sec-problem').innerHTML = `
    <div class="section-label">Problem</div>
    <p class="text">${a.problem}</p>
    <div class="section-label">Required features</div>
    <ul class="list">${a.features.map(f=>`<li>${f}</li>`).join('')}</ul>
    ${a.starter ? `<div class="section-label">Starter code</div><pre>${esc(a.starter)}</pre>` : ''}
  `;

  document.getElementById('sec-solution').innerHTML = `
    <div class="section-label">Solution</div>
    <pre>${esc(a.solution)}</pre>
    <div class="section-label">Explanation</div>
    <p class="text">${a.explanation}</p>
  `;

  document.getElementById('sec-io').innerHTML = `
    <div class="section-label">Sample input / output</div>
    ${a.inputOutput.map(io => `
      <div class="io-row">
        <div class="io-box"><div class="io-label">Input</div><pre>${esc(io.input)}</pre></div>
        <div class="io-box"><div class="io-label">Output</div><pre>${esc(io.output)}</pre></div>
      </div>`).join('')}
    <div class="section-label">Edge cases</div>
    <ul class="list">${a.edgeCases.map(e=>`<li>${e}</li>`).join('')}</ul>
  `;

  document.getElementById('sec-followup').innerHTML = `
    <div class="section-label">Interview follow-up question</div>
    <div class="callout">${a.followUp}</div>
    <button class="generate-btn" style="margin-top:12px" onclick="sendPrompt('Answer this Kotlin/Android interview follow-up question in depth: ${a.followUp.replace(/'/g, "\\'")} ↗')">Discuss this question ↗</button>
  `;

  switchTab();
}

function switchTab() {
  const tabs2 = ['problem','solution','io','followup'];
  tabs2.forEach(t => {
    const sec = document.getElementById('sec-' + t);
    if (sec) sec.className = 'section' + (activeTab === t ? ' visible' : '');
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.className = 'tab' + (tabs2[i] === activeTab ? ' active' : '');
  });
}

function navigate(dir) {
  const filtered = getFiltered();
  currentIdx = Math.max(0, Math.min(currentIdx + dir, filtered.length - 1));
  renderCard();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderFilters();
renderCard();
</script>
